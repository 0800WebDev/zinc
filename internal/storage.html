<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Local Storage</title>
<style>
  body {
    background: black;
    color: white;
  }
</style>
</head>
<body>
<pre id="out"></pre>

<script>
const data = {};
for (let i = 0; i < localStorage.length; i++) {
  const key = localStorage.key(i);
  data[key] = localStorage.getItem(key);
}
document.getElementById("out").textContent = "```" + JSON.stringify(data, null, 2) + "```";
</script>

</body>
</html>
