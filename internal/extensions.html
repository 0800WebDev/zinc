<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Extensions</title>

<style>
body{
    font-family:sans-serif;
    background:#111;
    color:white;
    margin:20px;
}

#extensions{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.extension{
    background:#1b1b1b;
    border-radius:10px;
    padding:15px;
    display:flex;
    align-items:center;
    gap:15px;
}

.extension img{
    width:48px;
    height:48px;
    object-fit:contain;
}

.info{
    flex:1;
}

button{
    padding:8px 14px;
    cursor:pointer;
}
</style>

</head>
<body>

<h1>Installed Extensions</h1>

<div id="extensions"></div>

<script src="../extension-importer.js"></script>

<script>

async function loadExtensions(){

    const db = await openDB();

    const tx = db.transaction(STORE_NAME, "readonly");

    const request = tx.objectStore(STORE_NAME).getAll();

    request.onsuccess = ()=>{

        const container = document.getElementById("extensions");

        container.innerHTML = "";

        for(const extension of request.result){

            const card = document.createElement("div");
            card.className = "extension";

            const iconPath = extension.manifest.icon;

            const icon =
                iconPath &&
                extension.files[iconPath]
                    ? extension.files[iconPath].data
                    : "";

            card.innerHTML = `
                <img src="${icon}">
                <div class="info">
                    <h2>${extension.manifest.name}</h2>
                    <div>${extension.manifest.version}</div>
                    <div>${extension.manifest.description || ""}</div>
                </div>
                <button>Open</button>
            `;

            card.querySelector("button").onclick = ()=>{

                parent.postMessage({
                    type:"navigate",
                    url:`extension://${extension.id}/${extension.manifest.popup || "popup.html"}`
                },"*");

            };

            container.appendChild(card);

        }

    };

}

loadExtensions();

</script>

</body>
</html>
