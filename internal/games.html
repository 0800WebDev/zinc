<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

b{
    text-align:center !important;
    padding:20px;
}

#games{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
    gap:20px;
    padding:20px;
}

.game{
    background:#1e1e1e;
    border-radius:12px;
    overflow:hidden;
    text-align:center;
}

.game img{
    width:100%;
    aspect-ratio:16/9;
    object-fit:cover;
}

.game h3{
    margin:10px;
    font-size:18px;
}

.game button{
    width:90%;
    margin:10px;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#4CAF50;
    color:white;
    cursor:pointer;
    font-size:16px;
}

#launcher{
    display:none;
    width:100%;
    height:100vh;
    background:white;
}
a{
    color: whitesmoke;
}
#back{
    position:fixed;
    top:10px;
    left:10px;
    z-index:1000;
    padding:10px 16px;
    border:none;
    border-radius:8px;
    background:#4CAF50;
    color:white;
    cursor:pointer;
        }
</style>
</head>
<body>

<div id="browser">
     <b>Imported from <a href="https://pgis3.vercel.app" target="_blank">pgis 3</a></b>
       <div id="games"></div>
</div>

<div id="launcher"></div>

<script>
const BASE = "https://pgis3.vercel.app";

async function loadGames() {
    const names = await fetch(`${BASE}/games.json`).then(r => r.json());

    const container = document.getElementById("games");

    for (const name of names) {
        const card = document.createElement("div");
        card.className = "game";

        card.innerHTML = `
            <img src="${BASE}/games/${encodeURIComponent(name)}.png">
            <h3>${name}</h3>
            <button>Play</button>
        `;

        card.querySelector("button").onclick = () => playGame(name);

        container.appendChild(card);
    }
}

async function playGame(name) {
    const html = await fetch(`${BASE}/games/${encodeURIComponent(name)}.html`)
        .then(r => r.text());

    const blob = new Blob([html], { type: "text/html" });
    const url = URL.createObjectURL(blob);

    document.getElementById("browser").style.display = "none";

    const launcher = document.getElementById("launcher");
    launcher.style.display = "block";
    launcher.innerHTML = `
        <button id="back">← Back</button>
        <iframe
            id="game"
            src="${url}"
            style="width:100%;height:calc(100vh - 50px);border:none;"
        ></iframe>
    `;

    document.getElementById("back").onclick = () => {
        URL.revokeObjectURL(url);

        launcher.style.display = "none";
        launcher.innerHTML = "";

        document.getElementById("browser").style.display = "block";
    };
    }

loadGames();
</script>

</body>
</html>
